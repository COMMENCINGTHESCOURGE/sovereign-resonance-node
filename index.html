<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUINEA PIG TRENCH LLC - CONTINUITY ENGINE INTEGRATION</title>
    <style>
        :root {
            --bg-color: #050508;
            --text-color: #00ffc8;
            --highlight-color: #ff3c00;
            --console-bg: #0a111a;
            --border-color: #1a334d;
            --font-stack: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--text-color);
        }

        #main-display {
            flex: 1;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        #terrain-monitor {
            flex: 2;
            background: #000;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 15px rgba(0, 255, 200, 0.2);
            position: relative;
            overflow: hidden;
        }

        #terrain-canvas {
            width: 100%;
            height: 100%;
        }

        .sub-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #resonance-monitor {
            height: 50%;
            border: 2px solid var(--border-color);
            background: #000;
            position: relative;
        }

        #resonance-canvas {
            width: 100%;
            height: 100%;
        }

        #system-console {
            background-color: var(--console-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            height: 50%;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
        }

        #console-log {
            flex: 1;
            font-size: 0.9em;
            line-height: 1.4;
            color: #d0ffe0;
        }

        #console-log .log-entry {
            margin-bottom: 4px;
        }

        #console-log .status-good { color: var(--text-color); }
        #console-log .status-warn { color: #ffd700; }
        #console-log .status-crit { color: var(--highlight-color); font-weight: bold; }

        .scourge-active {
            color: var(--highlight-color) !important;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        #footer-status {
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
            color: #4a6d8c;
            border-top: 1px solid var(--border-color);
            padding-top: 5px;
        }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box;">
        <span>GUINEA PIG TRENCH LLC - CONTINUITY ENGINE INTEGRATION</span>
        <div style="font-size: 0.7em; display: flex; gap: 8px; align-items: center; border-left: 1px solid var(--border-color); padding-left: 15px;">
            <label for="mode-select" style="color: var(--text-color); letter-spacing: 1px; font-weight: bold;">SUBSTRATE MODE:</label>
            <select id="mode-select" style="background: #000; color: var(--text-color); border: 1px solid var(--border-color); font-family: var(--font-stack); font-size: 1.0em; padding: 2px 6px; outline: none; cursor: pointer; border-radius: 2px;">
                <option value="seed">SEED (DEMO)</option>
                <option value="local">LOCAL (FILE)</option>
                <option value="firebase">FIREBASE (CLOUD)</option>
            </select>
        </div>
    </header>

    <div id="main-display">
        <div id="terrain-monitor">
            <canvas id="terrain-canvas"></canvas>
        </div>

        <div class="sub-panel">
            <div id="resonance-monitor">
                <canvas id="resonance-canvas"></canvas>
            </div>
            
            <div id="system-console">
                <div id="console-log">
                    <div class="log-entry status-good">[SYS] Booting Continuity Core v0.9.3... [OK]</div>
                    <div class="log-entry status-good">[SYS] Initializing Hyperpoly Terrain mesh fabric... [OK]</div>
                    <div class="log-entry status-good">[SYS] Linking Sovereign Resonance Node... [WAIT]</div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-status">
        <span>STATION ID: GPT-CEI-001</span>
        <span id="current-cycle">CYCLE: 0000000000</span>
        <span>LATENCY: 0.00ms</span>
    </div>

    <script type="module">
        import { BridgeClient, channelsToTerrainParams, ratioToEQ, vinculumBind, WORLD_TENSOR_MAP } from './bridge-client.js';

        const terrainCanvas = document.getElementById('terrain-canvas');
        const ctxT = terrainCanvas.getContext('2d');
        const resonanceCanvas = document.getElementById('resonance-canvas');
        const ctxR = resonanceCanvas.getContext('2d');
        const consoleLog = document.getElementById('console-log');
        const cycleDisplay = document.getElementById('current-cycle');
        const modeSelect = document.getElementById('mode-select');

        function resize() {
            terrainCanvas.width = terrainCanvas.parentElement.clientWidth;
            terrainCanvas.height = terrainCanvas.parentElement.clientHeight;
            resonanceCanvas.width = resonanceCanvas.parentElement.clientWidth;
            resonanceCanvas.height = resonanceCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ── VINCULUM STATE — live channels from bridge ──
        let activeChannels = { density: 0.5, cohesion: 0.5, permeability: 0.5, water: 0.3, sediment: 0.1, oxidation: 0.1 };
        let activeMetrics  = { bound_ratio: 0.5, vinculum_ratio: 'undetermined' };
        let activeSubstrate = 'terrain';
        let terrainParams = channelsToTerrainParams(activeChannels);
        let eqGains = ratioToEQ(0.5);

        // ── BRIDGE CLIENT — wires vinculum into render loop ──
        const bridge = new BridgeClient({ world: 'the_between', seed: 113 });
        
        modeSelect.addEventListener('change', async (e) => {
            const newMode = e.target.value;
            await bridge.setMode(newMode);
            const entry = document.createElement('div');
            entry.className = 'log-entry status-warn';
            entry.textContent = `[SYS] Switching vinculum mode to ${newMode.toUpperCase()}...`;
            consoleLog.appendChild(entry);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        });

        bridge.onUpdate((channels, metrics, substrate) => {
            if (modeSelect.value !== bridge.mode) {
                modeSelect.value = bridge.mode;
            }
            if (substrate === 'terrain') {
                activeChannels = channels;
                terrainParams = channelsToTerrainParams(channels);
            }
            if (substrate === 'integer') {
                eqGains = ratioToEQ(metrics.bound_ratio);
            }
            activeMetrics = metrics;
            activeSubstrate = substrate;

            // Log vinculum events to console
            logVinculumEvent(substrate, metrics);
        });
        bridge.start();

        // ── STRATA COLORS — hue-shifted by oxidation channel ──
        const BASE_COLORS = [
            [32, 74, 140],   // deep blue
            [90, 30, 138],   // violet
            [199, 92, 49],   // terracotta
            [232, 230, 227], // bone
            [57, 109, 63],   // forest
            [201, 162, 42],  // gold
            [40, 120, 160],  // teal
            [180, 40, 80],   // crimson
            [60, 60, 100],   // slate
            [140, 180, 60],  // lime
        ];

        function hueShift(r, g, b, degrees) {
            const rad = degrees * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);
            const nr = r * (0.299 + 0.701 * cos + 0.168 * sin) +
                       g * (0.587 - 0.587 * cos + 0.330 * sin) +
                       b * (0.114 - 0.114 * cos - 0.497 * sin);
            const ng = r * (0.299 - 0.299 * cos - 0.328 * sin) +
                       g * (0.587 + 0.413 * cos + 0.035 * sin) +
                       b * (0.114 - 0.114 * cos + 0.292 * sin);
            const nb = r * (0.299 - 0.300 * cos + 1.250 * sin) +
                       g * (0.587 - 0.588 * cos - 1.050 * sin) +
                       b * (0.114 + 0.886 * cos - 0.203 * sin);
            return [Math.round(Math.max(0, Math.min(255, nr))),
                    Math.round(Math.max(0, Math.min(255, ng))),
                    Math.round(Math.max(0, Math.min(255, nb)))];
        }

        function drawTerrain(time) {
            ctxT.clearRect(0, 0, terrainCanvas.width, terrainCanvas.height);

            // Vinculum-driven strata: count, amplitude, frequency, hue from channels
            const numStrata = terrainParams.numStrata;
            const baseAmp = terrainParams.amplitude;
            const baseFreq = terrainParams.frequency;
            const hueShiftDeg = terrainParams.oxidationHue;
            const erosion = terrainParams.erosionRate;

            for (let i = 0; i < numStrata; i++) {
                const [cr, cg, cb] = hueShift(...BASE_COLORS[i % BASE_COLORS.length], hueShiftDeg);
                ctxT.beginPath();
                ctxT.fillStyle = `rgba(${cr},${cg},${cb},0.2)`;
                const offset = i * (terrainCanvas.height / (numStrata + 2));
                const frequency = baseFreq + i * 0.002;
                const amplitude = baseAmp + i * (15 - erosion * 200);

                ctxT.moveTo(0, offset + amplitude * Math.sin(time * frequency));
                for (let x = 0; x < terrainCanvas.width; x += 5) {
                    const y = offset + amplitude * Math.sin((x * frequency) + time * frequency * 0.5);
                    ctxT.lineTo(x, y);
                }
                ctxT.lineTo(terrainCanvas.width, terrainCanvas.height);
                ctxT.lineTo(0, terrainCanvas.height);
                ctxT.closePath();
                ctxT.fill();
            }

            // Wet-front markers — position scaled by water + permeability
            const waterLevel = activeChannels.water;
            const permFlow = activeChannels.permeability;
            const arms = [
                {x: (0.2 + waterLevel * 0.2) * terrainCanvas.width,  y: (0.2 + permFlow * 0.2) * terrainCanvas.height},
                {x: (0.5 + waterLevel * 0.2) * terrainCanvas.width,  y: (0.3 + permFlow * 0.2) * terrainCanvas.height}
            ];
            ctxT.fillStyle = `rgba(255, 102, 0, ${0.3 + waterLevel * 0.4})`;
            arms.forEach(arm => {
                ctxT.beginPath();
                const radius = 10 + waterLevel * 15;
                ctxT.arc(arm.x, arm.y + Math.sin(time*0.1)*5, radius, 0, Math.PI * 2);
                ctxT.fill();
            });
        }

        function drawResonance(time) {
            ctxR.clearRect(0, 0, resonanceCanvas.width, resonanceCanvas.height);
            const cx = resonanceCanvas.width / 2;
            const cy = resonanceCanvas.height / 2;

            // Radius pulses with bound_ratio
            const ratio = activeMetrics.bound_ratio || 0.5;
            const radius = 50 + ratio * 30 + Math.sin(time * 0.05) * 5;

            // EQ-driven line colors (5 bands → 5 color intensities)
            const lineColors = eqGains.map((g, i) => {
                const hue = 160 + i * 20; // cyan → green range
                const light = 40 + g * 40;
                return `hsl(${hue}, 70%, ${light}%)`;
            });

            // Draw resonance pattern — vinculum binding visualization
            const numLines = 20 + Math.round(activeChannels.cohesion * 15);
            for (let i = 0; i < numLines; i++) {
                const angle1 = (i / numLines) * Math.PI * 2;
                const angle2 = ((i + Math.floor(numLines / 4)) / numLines) * Math.PI * 2;
                ctxR.strokeStyle = lineColors[i % lineColors.length];
                ctxR.lineWidth = 0.5 + ratio;
                ctxR.beginPath();
                ctxR.moveTo(cx + radius * Math.cos(angle1), cy + radius * Math.sin(angle1));
                ctxR.lineTo(cx + radius * Math.cos(angle2 + time * 0.01), cy + radius * Math.sin(angle2 + time * 0.01));
                ctxR.stroke();
            }

            // Core ring — size reflects partition completeness
            const coreRadius = radius * (0.2 + (activeMetrics.partition_completeness || 0.5) * 0.15);
            ctxR.strokeStyle = `hsl(160, 80%, ${50 + ratio * 30}%)`;
            ctxR.lineWidth = 1.5 + ratio;
            ctxR.beginPath();
            ctxR.arc(cx, cy, coreRadius, 0, Math.PI * 2);
            ctxR.stroke();

            // Ratio label
            ctxR.fillStyle = '#00ffc866';
            ctxR.font = '9px Courier New';
            ctxR.textAlign = 'center';
            ctxR.fillText(`${activeMetrics.vinculum_ratio || '—'} | ${(ratio).toFixed(4)}`, cx, cy + coreRadius + 14);
        }

        // ── VINCULUM CONSOLE — replaces static messages ──
        let messageIndex = 0;
        let scourged = false;

        function logVinculumEvent(substrate, metrics) {
            if (scourged) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const ratio = (metrics.bound_ratio || 0).toFixed(6);
            const label = metrics.vinculum_ratio || '?';

            if (substrate === 'terrain') {
                entry.classList.add('status-good');
                entry.textContent = `[HPT] Vinculum terrain bind: ${label} → ${ratio}`;
            } else if (substrate === 'integer') {
                const isAnomaly = metrics.bound_ratio < 0.01;
                entry.classList.add(isAnomaly ? 'status-crit' : 'status-good');
                entry.textContent = `[ES] Sieve stride-24 bind: ${label} → ${ratio}${isAnomaly ? ' ⚠ LOW' : ''}`;
            } else if (substrate === 'infrastructure') {
                entry.classList.add('status-warn');
                entry.textContent = `[SYS] Infrastructure bind: ${label} → ${ratio}`;
            }

            consoleLog.appendChild(entry);
            consoleLog.scrollTop = consoleLog.scrollHeight;
            messageIndex++;

            // Preserve the scourge sequence
            if (messageIndex > 30 && !scourged) {
                triggerScourge();
            }
        }

        // Initial boot messages
        const bootMessages = [
            { text: "[SYS] Booting Continuity Core v0.9.3... [OK]", type: "good" },
            { text: "[SYS] Initializing Hyperpoly Terrain mesh fabric... [OK]", type: "good" },
            { text: "[SYS] Linking Sovereign Resonance Node... [WAIT]", type: "good" },
            { text: "[BRIDGE] Vinculum binding operator engaged.", type: "good" },
            { text: `[BRIDGE] Mode: ${bridge.mode.toUpperCase()} — polling every ${bridge.pollInterval}ms`, type: "good" },
        ];

        bootMessages.forEach((msg, i) => {
            setTimeout(() => {
                const entry = document.createElement('div');
                entry.className = `log-entry status-${msg.type}`;
                entry.textContent = msg.text;
                consoleLog.appendChild(entry);
                consoleLog.scrollTop = consoleLog.scrollHeight;
            }, i * 400);
        });

        function triggerScourge() {
            scourged = true;
            const sep = document.createElement('div');
            sep.textContent = "---------------------------------------------";
            consoleLog.appendChild(sep);

            const scourgeMsg = document.createElement('div');
            scourgeMsg.className = 'log-entry scourge-active';
            scourgeMsg.textContent = ">>> COMMENCING THE SCOURGE.";
            consoleLog.appendChild(scourgeMsg);

            const crit = document.createElement('div');
            crit.className = 'log-entry status-crit';
            crit.textContent = "[CRITICAL] FIELD COLLAPSE IMMINENT. NON-EUCLIDEAN PROJECTION OVERFLOW.";
            consoleLog.appendChild(crit);

            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        let frameCount = 0;
        function animate() {
            const time = performance.now();
            drawTerrain(time * 0.1);
            drawResonance(time * 0.1);

            frameCount++;
            cycleDisplay.textContent = `CYCLE: ${String(frameCount).padStart(10, '0')}`;

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
